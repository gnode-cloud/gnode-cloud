<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2997ff"/>
      <stop offset="100%" stop-color="#5e5ce6"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.7)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" fill="#000000" rx="16"/>
  <ellipse cx="80" cy="100" rx="70" ry="70" fill="rgba(41,151,255,0.07)"/>

  <!-- Icon square -->
  <rect x="24" y="60" width="80" height="80" rx="20" fill="url(#blueGrad)"/>
  <rect x="36" y="72" width="56" height="56" rx="10" fill="rgba(0,0,0,0.4)"/>

  <!-- Circuit pins -->
  <line x1="52" y1="72" x2="52" y2="66" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="72" x2="64" y2="66" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
  <line x1="76" y1="72" x2="76" y2="66" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="128" x2="52" y2="134" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="128" x2="64" y2="134" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
  <line x1="76" y1="128" x2="76" y2="134" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="88" x2="30" y2="88" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="100" x2="30" y2="100" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="112" x2="30" y2="112" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
  <line x1="92" y1="88" x2="98" y2="88" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
  <line x1="92" y1="100" x2="98" y2="100" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
  <line x1="92" y1="112" x2="98" y2="112" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>

  <!-- G letter -->
  <text x="64" y="108" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial Black, sans-serif" font-weight="900" font-size="34"
        fill="white">G</text>

  <!-- NODE text -->
  <text x="124" y="90" font-family="Arial Black, sans-serif" font-weight="900"
        font-size="30" letter-spacing="2" fill="white">NODE</text>

  <!-- Blue dot + divider -->
  <circle cx="126" cy="107" r="3.5" fill="#2997ff"/>
  <line x1="133" y1="107" x2="310" y2="107" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- CLOUD text -->
  <text x="124" y="127" font-family="Arial Black, sans-serif" font-weight="700"
        font-size="19" letter-spacing="7" fill="rgba(255,255,255,0.5)">CLOUD</text>

  <!-- Tagline -->
  <text x="124" y="150" font-family="Arial, sans-serif" font-weight="400"
        font-size="10" letter-spacing="3.5" fill="rgba(41,151,255,0.75)">GPU CLOUD · RUSSIA</text>

  <!-- Decorative dots -->
  <circle cx="355" cy="48" r="2.5" fill="rgba(41,151,255,0.5)"/>
  <circle cx="368" cy="48" r="2.5" fill="rgba(41,151,255,0.3)"/>
  <circle cx="381" cy="48" r="2.5" fill="rgba(41,151,255,0.15)"/>
  <circle cx="355" cy="61" r="2.5" fill="rgba(41,151,255,0.3)"/>
  <circle cx="368" cy="61" r="2.5" fill="rgba(41,151,255,0.15)"/>
  <circle cx="355" cy="74" r="2.5" fill="rgba(41,151,255,0.15)"/>
</svg>
