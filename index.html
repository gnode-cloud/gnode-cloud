<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NODE.CLOUD — Личный кабинет</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #000;
  --bg2: #0a0a0a;
  --bg3: #111;
  --surface: rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f5f5f7;
  --text2: rgba(245,245,247,0.6);
  --text3: rgba(245,245,247,0.35);
  --blue: #2997ff;
  --green: #30d158;
  --red: #ff453a;
  --orange: #ff9f0a;
  --purple: #bf5af2;
  --yellow: #ffd60a;
  --r: cubic-bezier(0.4,0,0.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* GRAIN */
body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;opacity:.5;
}

/* AMBIENT */
.amb{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.amb span{position:absolute;border-radius:50%;filter:blur(90px);opacity:.7;animation:af 18s ease-in-out infinite}
.amb span:nth-child(1){width:500px;height:500px;background:radial-gradient(circle,rgba(41,151,255,.1),transparent 70%);top:-150px;left:-100px;animation-delay:0s}
.amb span:nth-child(2){width:400px;height:400px;background:radial-gradient(circle,rgba(191,90,242,.07),transparent 70%);bottom:-100px;right:-80px;animation-delay:-9s}
@keyframes af{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,-15px) scale(1.05)}}

/* LAYOUT */
.shell{display:flex;min-height:100vh;position:relative;z-index:1}

/* SIDEBAR */
.sidebar{
  width:240px;flex-shrink:0;
  background:rgba(10,10,10,.95);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;
  backdrop-filter:blur(20px);
}

.sb-logo{
  display:flex;align-items:center;gap:10px;
  padding:22px 20px 18px;
  border-bottom:1px solid var(--border);
}
.sb-logo-icon{
  width:28px;height:28px;border-radius:7px;
  background:linear-gradient(135deg,#2997ff,#5e5ce6);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:13px;color:#fff;
}
.sb-logo-txt{font-size:13px;font-weight:700;letter-spacing:.08em;color:var(--text)}

.sb-user{
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.sb-avatar{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,#2997ff,#5e5ce6);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;flex-shrink:0;
}
.sb-user-name{font-size:12px;font-weight:600;color:var(--text)}
.sb-user-email{font-size:10px;color:var(--text3);margin-top:1px}

.sb-balance{
  margin:12px 14px;
  padding:12px 14px;
  border-radius:12px;
  background:rgba(41,151,255,.07);
  border:1px solid rgba(41,151,255,.15);
}
.sb-balance-label{font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--blue);margin-bottom:4px}
.sb-balance-val{font-size:20px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;color:var(--text)}
.sb-balance-sub{font-size:10px;color:var(--text3);margin-top:2px}

.sb-top-btn{
  margin:0 14px 12px;width:calc(100% - 28px);
  padding:9px;border-radius:10px;border:none;
  background:var(--blue);color:#fff;
  font-size:12px;font-weight:700;cursor:pointer;
  transition:all .2s var(--r);letter-spacing:.01em;
}
.sb-top-btn:hover{background:#3aa0ff;transform:translateY(-1px);box-shadow:0 6px 20px rgba(41,151,255,.35)}

.sb-nav{padding:6px 10px;flex:1;display:flex;flex-direction:column;gap:2px}
.sb-nav-section{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:10px 8px 6px}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:9px;
  font-size:12px;font-weight:500;color:var(--text2);
  cursor:pointer;transition:all .18s;border:1px solid transparent;
  text-decoration:none;
}
.sb-item:hover{background:var(--surface2);color:var(--text);border-color:var(--border)}
.sb-item.active{background:rgba(41,151,255,.1);color:var(--blue);border-color:rgba(41,151,255,.18)}
.sb-item-icon{font-size:14px;flex-shrink:0;width:18px;text-align:center}
.sb-badge{
  margin-left:auto;
  background:var(--red);color:#fff;
  font-size:9px;font-weight:700;
  padding:2px 6px;border-radius:20px;min-width:18px;text-align:center;
}
.sb-badge.green{background:rgba(48,209,88,.15);color:var(--green);border:1px solid rgba(48,209,88,.2)}

.sb-footer{padding:14px;border-top:1px solid var(--border)}
.sb-footer-text{font-size:10px;color:var(--text3);text-align:center;font-family:'SF Mono','Fira Code',monospace}

/* MAIN */
.main{flex:1;overflow-y:auto;min-width:0}

/* TOP NAV */
.topnav{
  position:sticky;top:0;z-index:50;
  height:56px;padding:0 28px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(0,0,0,.8);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.topnav-title{font-size:15px;font-weight:700;letter-spacing:-.01em}
.topnav-right{display:flex;align-items:center;gap:10px}
.notif-btn{
  position:relative;
  width:34px;height:34px;border-radius:9px;
  border:1px solid var(--border);background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text2);transition:all .2s;
}
.notif-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.notif-dot{
  position:absolute;top:7px;right:7px;
  width:7px;height:7px;border-radius:50%;
  background:var(--red);border:1.5px solid var(--bg);
}

/* PAGE */
.page{padding:28px;max-width:1100px;margin:0 auto}

/* SECTION TITLE */
.sec-title{font-size:13px;font-weight:700;letter-spacing:-.01em;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-title span{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text3)}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.stat-card{
  padding:18px 20px;border-radius:16px;
  border:1px solid var(--border);background:var(--surface);
  transition:all .2s var(--r);
}
.stat-card:hover{background:var(--surface2);border-color:var(--border2)}
.stat-icon{font-size:20px;margin-bottom:10px}
.stat-label{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.stat-val{font-size:22px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1}
.stat-val.green{color:var(--green)}
.stat-val.blue{color:var(--blue)}
.stat-val.orange{color:var(--orange)}
.stat-sub{font-size:10px;color:var(--text3);margin-top:5px}

/* GRID 2 COL */
.grid2{display:grid;grid-template-columns:1fr 340px;gap:16px;margin-bottom:28px}

/* CARD */
.card{
  border-radius:18px;border:1px solid var(--border);
  background:var(--surface);overflow:hidden;
}
.card-head{
  padding:18px 20px 14px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.card-head-title{font-size:13px;font-weight:700}
.card-head-action{font-size:11px;color:var(--blue);cursor:pointer;font-weight:600;transition:opacity .2s}
.card-head-action:hover{opacity:.7}

/* INSTANCE CARD */
.instance{
  padding:18px 20px;
  border-bottom:1px solid var(--border);
  transition:background .2s;
}
.instance:last-child{border-bottom:none}
.instance:hover{background:rgba(255,255,255,.02)}

.inst-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.inst-icon{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,rgba(41,151,255,.15),rgba(94,92,230,.1));
  border:1px solid rgba(41,151,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
}
.inst-info{flex:1;min-width:0}
.inst-name{font-size:14px;font-weight:700;letter-spacing:-.01em;margin-bottom:3px}
.inst-spec{font-size:11px;color:var(--text3);font-weight:500}
.inst-status{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;letter-spacing:.04em}
.status-dot{width:6px;height:6px;border-radius:50%;animation:pdot 2s ease-in-out infinite}
.status-dot.running{background:var(--green);box-shadow:0 0 6px rgba(48,209,88,.7)}
.status-dot.stopped{background:var(--red);animation:none}
.status-dot.pending{background:var(--orange)}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:.4}}
.status-text.running{color:var(--green)}
.status-text.stopped{color:var(--red)}
.status-text.pending{color:var(--orange)}

/* TIMER */
.timer-row{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;margin-bottom:12px;
}
.timer-label{font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
.timer-val{font-size:15px;font-weight:800;letter
